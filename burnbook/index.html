<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Burn Book · Ayush Kumar Singh</title>
  <meta name="description" content="Burn Book, an app by Ayush Kumar Singh.">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231d1d1f'/%3E%3Ctext x='50%25' y='50%25' dy='.36em' text-anchor='middle' font-family='-apple-system, Helvetica, Arial' font-size='34' font-weight='600' fill='%23ffffff'%3EA%3C/text%3E%3C/svg%3E">

  <style>
    :root {
      --ink: #1d1d1f;
      --secondary: #6e6e73;
      --tertiary: #86868b;
      --bg: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: grid;
      place-items: center;
      min-height: 100vh;
      min-height: 100svh;
      padding: 24px;
    }

    ::selection { background: var(--ink); color: #fff; }

    :focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 3px;
      border-radius: 6px;
    }

    .wrap {
      text-align: center;
      animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h1 {
      font-size: clamp(32px, 6vw, 40px);
      font-weight: 600;
      letter-spacing: -0.022em;
      line-height: 1.1;
    }

    .status {
      margin-top: 12px;
      font-size: 17px;
      color: var(--secondary);
    }

    .links {
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      font-size: 13px;
      color: var(--tertiary);
    }

    .links a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .links a:hover { color: var(--ink); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .wrap { animation: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Burn Book</h1>
    <p class="status">Work in progress.</p>
    <nav class="links">
      <a href="/burnbook/privacypolicy/">Privacy Policy</a>
      <span aria-hidden="true">·</span>
      <a href="/burnbook/eula/">EULA</a>
      <span aria-hidden="true">·</span>
      <a href="/">thisisayushs.com</a>
    </nav>
  </div>
</body>
</html>
